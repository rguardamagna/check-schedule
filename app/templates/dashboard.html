{% extends "base.html" %}
{% block content %}
<div x-data="dashboard()" x-init="init()">
    <h2 class="mb-3">Dashboard</h2>
    <div class="row mb-4">
        <div class="col-md-3 mb-2">
            <div class="card text-bg-primary h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">Pendientes</h5>
                    <p class="total-card" x-text="resumen.pendientes || '—'"></p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card text-bg-warning h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">A pagar hoy</h5>
                    <p class="total-card" x-text="'$' + formato(resumen.hoy)"></p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card text-bg-success h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">Pagados</h5>
                    <p class="total-card" x-text="resumen.pagados || '—'"></p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card text-bg-danger h-100">
                <div class="card-body text-center">
                    <h5 class="card-title">Vencidos</h5>
                    <p class="total-card" x-text="resumen.vencidos || '—'"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sección A pagar -->
    <div class="mb-4">
        <div class="d-flex align-items-center gap-3 mb-3">
            <h4 class="mb-0">A pagar</h4>
            <div class="btn-group btn-group-sm" role="group">
                <input type="radio" class="btn-check" name="vistaPagar" id="vistaHoy" value="hoy" x-model="vistaPagar" @change="cargarVistaPagar()">
                <label class="btn btn-outline-primary" for="vistaHoy">Hoy</label>
                <input type="radio" class="btn-check" name="vistaPagar" id="vistaSemana" value="semana" x-model="vistaPagar" @change="cargarVistaPagar()">
                <label class="btn btn-outline-primary" for="vistaSemana">Esta semana</label>
                <input type="radio" class="btn-check" name="vistaPagar" id="vistaTodos" value="todos" x-model="vistaPagar" @change="cargarVistaPagar()">
                <label class="btn btn-outline-primary" for="vistaTodos">Todos</label>
            </div>
        </div>

        <template x-if="cargandoPagar">
            <div class="text-center py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </template>

        <!-- Vista hoy -->
        <template x-if="vistaPagar === 'hoy' && !cargandoPagar">
            <div>
                <div class="card mb-3">
                    <div class="card-body text-center">
                        <h5>Total a pagar hoy</h5>
                        <p class="total-card mb-0" x-text="'$' + formato(pagarHoy.total)"></p>
                        <small class="text-muted" x-text="pagarHoy.cheques.length + ' cheques'"></small>
                    </div>
                </div>
                <template x-if="pagarHoy.cheques.length === 0">
                    <div class="alert alert-success">No hay cheques para pagar hoy.</div>
                </template>
                <template x-if="pagarHoy.cheques.length > 0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Proveedor</th>
                                    <th>Importe</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th class="no-print">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="ch in pagarHoy.cheques" :key="ch.id">
                                    <tr :class="{'fila-en-riesgo': esEnRiesgo(ch)}">
                                        <td x-text="ch.proveedor"></td>
                                        <td x-text="'$' + formato(ch.importe)"></td>
                                        <td x-text="ch.fecha_vencimiento"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="{'badge-pendiente': ch.estado === 'pendiente' && !esEnRiesgo(ch), 'badge-en-riesgo': ch.estado === 'pendiente' && esEnRiesgo(ch), 'badge-pagado': ch.estado === 'pagado', 'badge-vencido': ch.estado === 'vencido'}"
                                                  x-text="esEnRiesgo(ch) ? 'no ingresado' : ch.estado"></span>
                                        </td>
                                        <td class="no-print">
                                            <button class="btn btn-success btn-sm"
                                                    @click="pagar(ch.id)"
                                                    :disabled="cargando">Pagar</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </template>

        <!-- Vista semana -->
        <template x-if="vistaPagar === 'semana' && !cargandoPagar">
            <div>
                <div class="card mb-3">
                    <div class="card-body text-center">
                        <h5>Total semanal</h5>
                        <p class="total-card mb-0" x-text="'$' + formato(pagarSemana.total)"></p>
                        <small class="text-muted" x-text="pagarSemana.cheques.length + ' cheques en la semana'"></small>
                    </div>
                </div>
                <template x-if="pagarSemana.cheques.length === 0">
                    <div class="alert alert-success">No hay cheques para pagar esta semana.</div>
                </template>
                <template x-if="pagarSemana.cheques.length > 0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Día</th>
                                    <th>Proveedor</th>
                                    <th>Importe</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th class="no-print">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="ch in pagarSemana.cheques" :key="ch.id">
                                    <tr :class="{'fila-en-riesgo': esEnRiesgo(ch)}">
                                        <td x-text="ch.dia_semana"></td>
                                        <td x-text="ch.proveedor"></td>
                                        <td x-text="'$' + formato(ch.importe)"></td>
                                        <td x-text="ch.fecha_vencimiento"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="{'badge-pendiente': ch.estado === 'pendiente' && !esEnRiesgo(ch), 'badge-en-riesgo': ch.estado === 'pendiente' && esEnRiesgo(ch), 'badge-pagado': ch.estado === 'pagado', 'badge-vencido': ch.estado === 'vencido'}"
                                                  x-text="esEnRiesgo(ch) ? 'no ingresado' : ch.estado"></span>
                                        </td>
                                        <td class="no-print">
                                            <button class="btn btn-success btn-sm"
                                                    @click="pagar(ch.id)"
                                                    :disabled="cargando">Pagar</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </template>

        <!-- Vista todos -->
        <template x-if="vistaPagar === 'todos' && !cargandoPagar">
            <div>
                <div class="card mb-3">
                    <div class="card-body text-center">
                        <h5>Total general</h5>
                        <p class="total-card mb-0" x-text="'$' + formato(pagarTodos.total)"></p>
                        <small class="text-muted" x-text="pagarTodos.cheques.length + ' cheques'"></small>
                    </div>
                </div>
                <template x-if="pagarTodos.cheques.length === 0">
                    <div class="alert alert-info">No hay cheques registrados.</div>
                </template>
                <template x-if="pagarTodos.cheques.length > 0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Proveedor</th>
                                    <th>Importe</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th class="no-print">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="ch in pagarTodos.cheques" :key="ch.id">
                                    <tr :class="{'fila-en-riesgo': esEnRiesgo(ch)}">
                                        <td x-text="ch.proveedor"></td>
                                        <td x-text="'$' + formato(ch.importe)"></td>
                                        <td x-text="ch.fecha_vencimiento"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="{'badge-pendiente': ch.estado === 'pendiente' && !esEnRiesgo(ch), 'badge-en-riesgo': ch.estado === 'pendiente' && esEnRiesgo(ch), 'badge-pagado': ch.estado === 'pagado', 'badge-vencido': ch.estado === 'vencido'}"
                                                  x-text="esEnRiesgo(ch) ? 'no ingresado' : ch.estado"></span>
                                        </td>
                                        <td class="no-print">
                                            <button class="btn btn-success btn-sm"
                                                    x-show="ch.estado === 'pendiente'"
                                                    @click="pagar(ch.id)"
                                                    :disabled="cargando">Pagar</button>
                                            <button class="btn btn-warning btn-sm"
                                                    x-show="ch.estado === 'pagado'"
                                                    @click="reabrir(ch.id)">Reabrir</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>

<script>
function dashboard() {
    return {
        resumen: { pendientes: '—', pagados: '—', vencidos: '—', hoy: 0 },
        proximos: [],
        cargando: false,
        vistaPagar: 'hoy',
        pagarHoy: { total: 0, cheques: [] },
        pagarSemana: { total: 0, cheques: [] },
        pagarTodos: { total: 0, cheques: [] },
        cargandoPagar: false,

        async init() {
            await Promise.all([this.cargarResumen(), this.cargarProximos(), this.cargarVistaPagar()]);
        },

        async cargarResumen() {
            try {
                const p = await fetch('/api/cheques?estado=pendiente&per_page=1');
                const dp = await p.json();
                this.resumen.pendientes = dp.total;

                const pg = await fetch('/api/cheques?estado=pagado&per_page=1');
                const dpg = await pg.json();
                this.resumen.pagados = dpg.total;

                const v = await fetch('/api/cheques?estado=vencido&per_page=1');
                const dv = await v.json();
                this.resumen.vencidos = dv.total;

                const i = await fetch('/api/informe');
                const di = await i.json();
                this.resumen.hoy = di.total_a_pagar || 0;
            } catch(e) { console.error(e); }
        },

        async cargarProximos() {
            try {
                const r = await fetch('/api/cheques?estado=pendiente&per_page=100');
                const data = await r.json();
                this.proximos = data.items;
                this.pagarTodos.cheques = data.items;
                this.pagarTodos.total = data.items.reduce((sum, ch) => sum + ch.importe, 0);
            } catch(e) { console.error(e); }
        },

        async pagar(id) {
            this.cargando = true;
            await fetch(`/api/cheques/${id}/pagar`, { method: 'POST' });
            await this.init();
            this.cargando = false;
        },

        async reabrir(id) {
            await fetch(`/api/cheques/${id}/reabrir`, { method: 'POST' });
            await this.init();
        },

        async cargarVistaPagar() {
            this.cargandoPagar = true;
            try {
                if (this.vistaPagar === 'hoy') {
                    const r = await fetch('/api/informe');
                    if (r.ok) {
                        const d = await r.json();
                        this.pagarHoy.total = d.total_a_pagar || 0;
                        this.pagarHoy.cheques = d.cheques || [];
                    }
                } else if (this.vistaPagar === 'semana') {
                    const hoy = new Date().toISOString().split('T')[0];
                    const r = await fetch(`/api/informe/semanal?fecha=${hoy}`);
                    if (r.ok) {
                        const d = await r.json();
                        const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                        const todos = [];
                        let total = 0;
                        for (const dia of d.dias || []) {
                            if (dia.cheques) {
                                for (const ch of dia.cheques) {
                                    const fecha = new Date(dia.fecha + 'T00:00:00');
                                    todos.push({ ...ch, dia_semana: dias[fecha.getDay()] });
                                    total += ch.importe;
                                }
                            }
                        }
                        this.pagarSemana.total = total;
                        this.pagarSemana.cheques = todos;
                    }
                } else {
                    await this.cargarProximos();
                }
            } catch(e) { console.error(e); }
            this.cargandoPagar = false;
        },

        formato(n) {
            if (n === undefined || n === null || n === '—') return '—';
            return new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        },

        esEnRiesgo(ch) {
            if (ch.estado !== 'pendiente') return false;
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            const venc = new Date(ch.fecha_vencimiento + 'T00:00:00');
            return venc < hoy;
        }
    };
}
</script>
{% endblock %}
